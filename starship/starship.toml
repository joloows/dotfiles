
format = """\
[Óā∂](bold fg:#33658A)\
[\uf120 ](bg:#33658A)\
[Óāį](bg:#FF9248 fg:#33658A)\
[ ÔĀľ ](bg:#FF9248 fg:#000000)\
$directory\
[Óāį](fg:#FF9248 bg:bright-green)\
$git_branch\
$git_status\
[Óāį ](fg:bright-green)\
$fill \
$cmd_duration\
$java\
$python\
$nodejs\
$rust\
$test\

$character\
"""

[fill]
symbol = " "
style = "bold #585858"

[directory]
style = "bg:#FF9248 fg:black"
format = "[$path ]($style)"
truncation_length = 4
truncate_to_repo = false
truncation_symbol = "../"

[directory.substitutions]
"Documents" = "Documents Ôúė "
"Downloads" = "Downloads ÔÄô "
"Music" = "Music ÔÄĀ "
"Pictures" = "PicturesÔÄĺ "
"VScode Projects" = "vs"

[git_branch]
symbol = "ÔĄď Ôźė"
style = "bg:bright-green fg:#000000"
format = '[[ $symbol $branch ](bg:bright-green fg:000000)]($style)'

[git_status]
style = "bg:bright-green"
format = '[[($all_status$ahead_behind )](bg:bright-green fg:#000000)]($style)'

[nodejs]
symbol = "Óúė"
style = "bg:#86BBD8"
format = '[[[Óā∂](bold fg:#86BBD8)$symbol $version](bg:#86BBD8)[Óāī ](bold fg:#86BBD8)]($style)'

[rust]
symbol = "Óě®"
style = "bg:#AF400E"
format = '[[[Óā∂](bold fg:#AF400E)[$symbol ($version) ](bg:#AF400E)[Óāī ](bold fg:#AF400E)]($style)'

[cmd_duration]
min_time = 1000
style = "bg:light blue"
show_milliseconds = false
format = '[[[Óā∂](bold fg:#52A2DA)ÔČź $duration](fg:black bg:#52A2DA)[Óāī ](fg:#52A2DA)]($style)'

[java]
# Added kotlin files
detect_extensions = ["java", "class", "gradle", "jar", "cljs", "cljc", "kt", "kts"]
style= "bg:FFA518"
format = '[[[Óā∂](bold fg:#FFA518)Óúł $version](fg:white bg:#FFA518)[Óāī ](fg:#FFA518)]($style)'

[python]
detect_extensions = ["py"]
style = "bg:#306998"
format = '[[[Óā∂](bold fg:#306998)ÓėÜ $virtualenv $version](fg:#FFD43B bg:#306998)[Óāī ](fg:#306998)]($style)'

[git_metrics]
disabled = false
added_style = "green"
deleted_style = "red"
format = '[+$added]($added_style)/[-$deleted ]($deleted_style)'

[character]
disabled = false
success_symbol = "[>](bold green)"
error_symbol = "[√ó](bold red)"
vicmd_symbol = "[<](bold green)"


env:
  TERM: alacritty

window:
  padding:
    x: 0
    y: 0

  decorations: none

  opacity: 0.9

font:
  normal:
    family: Hack Nerd Font Mono

colors:
  primary:
    # background: '#01152D'
    # background: '#161629'
    background: '#0f0f1f'

cursor:
  style:
    shape: Beam
    blinking: Always
  blink_interval: 800
  blink_timeout: 0

  vi_mode_style:
    shape: Block
